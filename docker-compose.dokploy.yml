services:
  umami-alerts:
    build: .
    restart: unless-stopped
    environment:
      - CRON_SCHEDULE=${CRON_SCHEDULE:-0 8 * * *}
      # SMTP Configuration (required)
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      # SMTP TLS (optional, defaults shown)
      - SMTP_TLS=${SMTP_TLS:-true}
      - SMTP_SKIP_TLS_VERIFY=${SMTP_SKIP_TLS_VERIFY:-false}  # Maps to skip_verify in TOML
      # App Settings (optional, defaults shown)
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_DRY_RUN=${APP_DRY_RUN:-false}
      - APP_MAX_CONCURRENT_JOBS=${APP_MAX_CONCURRENT_JOBS:-4}
      - APP_REPORT_TYPE=${APP_REPORT_TYPE:-daily}
      # Website configurations
      # NOTE: For multi-site configurations, use file mount instead. See DEPLOYMENT.md.
      - APP_WEBSITES_CONFIG=${APP_WEBSITES_CONFIG:-}